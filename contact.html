<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contact Roberto The Setter at ROV Jewelry for professional diamond setting inquiries, appointments, and insured shipping details.">
  <title>Contact Roberto | ROV Jewelry</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header" data-header>
    <a class="brand" href="index.html#home" aria-label="ROV Jewelry home">
      <img src="assets/images/rov-jewelry-logo.png" alt="ROV Jewelry logo">
      <span>ROV Jewelry</span>
    </a>
    <nav class="site-nav" aria-label="Primary navigation">
      <a href="index.html#home">Home</a>
      <a href="index.html#projects">Projects</a>
      <a href="index.html#designs">Designs</a>
      <a href="contact.html" class="active">Contact</a>
      <a href="index.html#socials">Socials</a>
    </nav>
  </header>

  <main>
    <section class="contact-page">
      <div class="contact-page-heading reveal">
        <p class="eyebrow">Contact Roberto</p>
        <h1>Start a Custom Inquiry</h1>
        <p>Use this form for appointment requests, diamond setting work, custom projects, repairs, and insured shipping questions.</p>
      </div>

      <form class="inquiry-form reveal" id="contact-form">
        <div class="form-row">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" autocomplete="name" required>
        </div>

        <div class="form-row">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" autocomplete="email" required>
        </div>

        <div class="form-row">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" autocomplete="tel">
        </div>

        <div class="form-row">
          <label for="location">Location</label>
          <input type="text" id="location" name="location" placeholder="DMV area or shipping state">
        </div>

        <div class="form-row">
          <label for="service">Project Type</label>
          <select id="service" name="service" required>
            <option value="">Select one</option>
            <option>Diamond setting</option>
            <option>Custom jewelry</option>
            <option>Repair or restoration</option>
            <option>CAD, rendering, or design</option>
            <option>Insured shipping inquiry</option>
            <option>Other</option>
          </select>
        </div>

        <div class="form-row">
          <label for="timeline">Preferred Timeline</label>
          <select id="timeline" name="timeline">
            <option value="">Select one</option>
            <option>As soon as possible</option>
            <option>Within 2 weeks</option>
            <option>Within 1 month</option>
            <option>Flexible</option>
          </select>
        </div>

        <div class="form-row full">
          <label for="message">Project Details</label>
          <textarea id="message" name="message" rows="7" placeholder="Share stone details, setting style, piece type, budget range, repair notes, or shipping questions." required></textarea>
        </div>

        <button class="button form-button" type="submit">Submit Inquiry</button>
        <p class="form-status" id="form-status" role="status" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <span>ROV Jewelry</span>
    <span>Professional Diamond Setter</span>
  </footer>

  <script src="script.js"></script>
</body>
</html>
